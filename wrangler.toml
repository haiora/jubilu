# Configuration Cloudflare Pages + Workers pour Jubilé.
# Nom du projet Cloudflare Pages (URL : https://jubilee-israel.pages.dev)
name = "jubilee-israel"
compatibility_date = "2024-07-29"
compatibility_flags = ["nodejs_compat"]

# Sortie de build Next.js via @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

# Base de données Cloudflare D1 (créer avec : npx wrangler d1 create jubilee-db)
[[d1_databases]]
binding = "DB"
database_name = "jubilee-db"
database_id = "6c438549-8a51-491a-98f5-61625057c050"

# Stockage R2 pour les médias produits / parchemins
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "jubilee-media"
